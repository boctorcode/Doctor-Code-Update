<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoctorCode</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#111;
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,255,.15);
}

.logo{
width:120px;
height:120px;
border-radius:25px;
margin-bottom:20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

.version{
color:#00e5ff;
font-size:18px;
margin-bottom:20px;
}

.box{
background:#1a1a1a;
padding:15px;
border-radius:15px;
margin-bottom:25px;
text-align:left;
}

.box h3{
margin-bottom:10px;
}

.box li{
margin:8px 0;
}

.btn{
display:block;
background:#00c853;
color:white;
text-decoration:none;
padding:16px;
border-radius:15px;
font-size:20px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:#00e676;
}

.footer{
margin-top:20px;
font-size:13px;
color:#888;
}
</style>

</head>
<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>DoctorCode</h1>

<div class="version">
Version 1.0
</div>

<div class="box">
<h3>What's New</h3>

<ul>
<li>✔ Bug Fixes</li>
<li>✔ Performance Improved</li>
<li>✔ New Features Added</li>
</ul>

</div>

<a class="btn" href="DoctorCode.apk">
⬇ Download APK
</a>

<div class="footer">
© DoctorCode
</div>

</div>

</body>
</html>
